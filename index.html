<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>わかってくんカード</title>
  <style>
    :root { color-scheme: light dark; --accent: #0a84ff; --border: #d6d6d6; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", sans-serif; line-height: 1.75; color: CanvasText; background: Canvas; }
    main { max-width: 760px; margin: 0 auto; padding: 48px 20px; }
    header { margin-bottom: 32px; }
    h1 { font-size: 2rem; line-height: 1.25; margin: 0 0 12px; }
    h2 { font-size: 1.25rem; margin: 32px 0 8px; }
    p { margin: 0 0 16px; }
    nav { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 24px; }
    a.button { color: white; background: var(--accent); text-decoration: none; padding: 10px 14px; border-radius: 10px; font-weight: 700; }
    a.link { color: var(--accent); }
    .card { border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 20px; }
    footer { margin-top: 40px; font-size: .9rem; opacity: .72; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>わかってくんカード</h1>
      <p>聞こえにくい時や声で伝えにくい時に、相手へ見せるための会話カードをすばやく表示できるアプリです。</p>
      <nav aria-label="ページ内リンク">
        <a class="button" href="support.html">サポート</a>
        <a class="button" href="privacy.html">プライバシーポリシー</a>
      </nav>
    </header>

    <section class="card">
      <h2>主な機能</h2>
      <p>緊急、病院、薬局、買い物、交通などの場面に合わせた定型文を表示できます。自由入力や音声認識を使って、その場で必要な内容を大きく見せることもできます。</p>
      <p>プレミアム機能を購入すると、お気に入り登録とカテゴリ内の並び替えを利用できます。</p>
    </section>

    <section class="card">
      <h2>サポートとプライバシー</h2>
      <p>使い方や不具合の相談は <a class="link" href="support.html">サポート</a> をご確認ください。データの扱いは <a class="link" href="privacy.html">プライバシーポリシー</a> に記載しています。</p>
    </section>

    <footer>
      <p>&copy; 2026 わかってくんカード</p>
    </footer>
  </main>
</body>
</html>

    const DEFAULT_LOCALE = "ja-JP";
    const STORAGE_KEY = "wakattekun-site-language";

    function normalizeLocale(locale) {
      if (!locale) return DEFAULT_LOCALE;
      const exact = LOCALES.find(item => item.code.toLowerCase() === locale.toLowerCase());
      if (exact) return exact.code;
      const language = locale.split("-")[0].toLowerCase();
      const matched = LOCALES.find(item => item.code.toLowerCase().startsWith(language + "-"));
      return matched ? matched.code : DEFAULT_LOCALE;
    }

    function currentLocale() {
      const params = new URLSearchParams(window.location.search);
      const requestedLocale = params.get("lang");
      if (requestedLocale) {
        const cleanUrl = `${window.location.pathname}${window.location.hash}`;
        history.replaceState(null, "", cleanUrl);
        return normalizeLocale(requestedLocale);
      }
      return normalizeLocale(localStorage.getItem(STORAGE_KEY) || navigator.language);
    }

    function setInternalLinks() {
      document.querySelectorAll("a[data-page]").forEach(link => {
        link.href = link.dataset.page;
      });
    }

    function applyLocale(locale) {
      const code = normalizeLocale(locale);
      const group = GROUPS[code] || "ja";
      const dict = Object.assign({}, SHARED.ja, TEXT.ja, SHARED[group] || {}, TEXT[group] || {});
      document.documentElement.lang = code;
      document.documentElement.dir = group === "ar" ? "rtl" : "ltr";
      document.title = dict.title === dict.appName ? dict.title : `${dict.title} | ${dict.appName}`;
      document.querySelectorAll("[data-i18n]").forEach(element => {
        const value = dict[element.dataset.i18n];
        if (value) element.textContent = value;
      });
      const select = document.getElementById("language-select");
      if (select) select.value = code;
      setInternalLinks();
      localStorage.setItem(STORAGE_KEY, code);
    }

    function setupLanguageSelect() {
      const select = document.getElementById("language-select");
      LOCALES.forEach(item => {
        const option = document.createElement("option");
        option.value = item.code;
        option.textContent = item.label;
        select.appendChild(option);
      });
      select.addEventListener("change", event => applyLocale(event.target.value));
    }

    setupLanguageSelect();
    applyLocale(currentLocale());
  </script>
